<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolyom</title>
    <style>
        body {
            /* İstediğin o yumuşak, koyu lacivert arka plan rengi */
            background-color: #1a2432; 
            /* Göz yormayan, kontrastlı yumuşak beyaz yazı rengi */
            color: #e2e8f0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 20px;
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            color: #ffffff; /* Başlık daha parlak beyaz */
        }
        p {
            font-size: 1.2em;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #cbd5e1; /* Paragraf bir tık daha mat */
        }
        .butonlar a {
            display: inline-block;
            margin: 0 10px;
            padding: 10px 20px;
            color: #1a2432; /* Buton içi lacivert yazı */
            background-color: #e2e8f0; /* Açık renk buton */
            text-decoration: none;
            border-radius: 8px; /* Köşeleri hafif yuvarlatılmış */
            font-weight: bold;
            transition: 0.3s;
        }
        .butonlar a:hover {
            background-color: #ffffff; /* Üzerine gelince parlasın */
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Adın Soyadın</h1>
        <p>Merhaba! Ben buraya kendi mesleğimi veya ilgi alanlarımı yazacağım. Burası benim dijital çalışma alanım. Çok yakında burada daha fazla detay olacak!</p>
        
        <div class="butonlar">
            <a href="https://linkedin.com/in/kullaniciadin" target="_blank">LinkedIn</a>
            <a href="mailto:senin.email@adresin.com">Bana Ulaş</a>
        </div>
    </div>
</body>
</html>
